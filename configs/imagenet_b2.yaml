name: imagenet_b2

model:
  type: dit
  variant: B/16         # patch_size=16 on 256×256 pixels → 256 tokens
  input_size: 256
  in_channels: 3
  num_classes: 1000
  pretrained: null      # path to a pretrained DiT checkpoint, or null to train from scratch

encoder:
  type: dinov2_b        # frozen DINOv2 ViT-B/14 for kernel feature space
  freeze: true

kernel:
  type: exponential
  tau: 0.05

data:
  type: imagenet
  hf_streaming: true                      # stream from HuggingFace Hub; no local copy needed
  hf_dataset_id: ILSVRC/imagenet-1k       # requires HF account + accepted license
  shuffle_buffer: 10_000
  # root: data/imagenet                   # set this instead of hf_streaming for local data
  image_size: 256
  n_samples_per_class: 64   # positives per step
  n_uncond: 32              # uncond negatives per step (total batch = 96)

training:
  steps: 400_000
  lr: 1.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 5_000
  ema_decay: 0.9999
  precision: bf16
  ckpt_every: 10_000
  log_every: 100

cfg:
  enabled: true
  alpha_max: 4.0
  uncond_prob: 0.1        # fraction of steps with dropped label

logging:
  wandb: false
  project: drifting-imagenet

output_dir: checkpoints/imagenet_b2
